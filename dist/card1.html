<!DOCTYPE html> <!--Card Completed-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./output.css" />
    <title>Document</title>
  </head>
  <body class="bg-white p-8 grid place-content-center h-screen">
    <h1 class="text-black text-4xl m-6 grid place-content-center font-serif">By Uswa Fatima</h1>

    <div class=" bg-white border border-gray-200 rounded-2xl w-100 shadow-lg overflow-hidden p-2">
      <div
        class="relative h-64 from-blue-400 to-purple-500 bg-linear-to-r rounded-2xl overflow-hidden  border-2 border-gray-300 drop-shadow-lg "
      >
        <img
          class="w-full h-full object-cover"
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR8-ATcyzAF5QPIBH8YCbNBkQxr1yG4PE5j_w&s"
          alt=""
        />
        <div class="absolute top-3 right-3">
          <button
            class="bg-white bg-opacity-90 rounded-xl border-2 border-gray-300 p-2 hover:bg-opacity-100"
          >
            <svg
              class="w-5 h-5 text-gray-700"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <circle cx="12" cy="5" r="2" />
              <circle cx="12" cy="12" r="2" />
              <circle cx="12" cy="19" r="2" />
            </svg>
          </button>
        </div>
      </div>

      <div class="relative px-4 pb-4">
        <div class="absolute -top-8 left-4">
          <img
            class="w-16 h-16 rounded-2xl object-cover object-center bg-white border-2 border-gray-300 shadow-md"
            src="https://thumbs.dreamstime.com/b/linear-geometric-d-square-letter-f-repeating-factory-fun-function-fast-creative-idea-vector-illustration-line-icon-clip-art-f-261680247.jpg"
            alt="App logo"
          />
        </div>

        <div class="pt-12 flex items-center gap-5 ">
          <h3 class="text-lg font-bold text-gray-900">Wordsometric</h3>
          <p
            class="bg-gray-400 text-xs text-black rounded-xl text-center px-2 py-1 whitespace-nowrap"
          >
            Third-party Payments
          </p>
        </div>
        <p class="text-sm text-gray-600 mt-3 line-clamp-2 h-15">
          Wordsometric allows you to create isometric layers without manually
          having to set them up.
        </p>
        <div
          class="flex items-center justify-between mt-4 pt-3 border-t border-gray-400 h-15"
        >
          <button
            class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-xl text-sm transition"
          >
            Install Now
          </button>
          <span class="text-xs text-gray-700 font-bold ml-2">
            30,000
            <span class="text-gray-500 font-normal">active installations</span>
          </span>
        </div>
      </div>
    </div>
  </body>
</html>
